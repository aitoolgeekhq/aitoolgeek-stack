name: stack

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      GHOST_DOMAIN: ${GHOST_DOMAIN}
      N8N_DOMAIN: ${N8N_DOMAIN}
      PLAUSIBLE_DOMAIN: ${PLAUSIBLE_DOMAIN}
      UPTIME_DOMAIN: ${UPTIME_DOMAIN}
    networks: [stack]
    depends_on: [ghost, n8n, plausible]

  ghost:
    image: ghost:5-alpine
    restart: unless-stopped
    environment:
      url: https://${GHOST_DOMAIN}
      database__client: mysql
      database__connection__host: ghost_db
      database__connection__user: ghost
      database__connection__password: ${GHOST_DB_PASSWORD}
      database__connection__database: ghost
      mail__transport: SMTP
      mail__options__host: ${MAIL_HOST}
      mail__options__port: ${MAIL_PORT:-587}
      mail__options__auth__user: ${MAIL_USER}
      mail__options__auth__pass: ${MAIL_PASSWORD}
      mail__from: ${MAIL_FROM}
    volumes:
      - ghost_content:/var/lib/ghost/content
    networks: [stack]
    depends_on:
      ghost_db:
        condition: service_healthy

  ghost_db:
    image: mysql:8.0
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ghost
      MYSQL_USER: ghost
      MYSQL_PASSWORD: ${GHOST_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${GHOST_DB_ROOT_PASSWORD}
    volumes:
      - ghost_db_data:/var/lib/mysql
    networks: [stack]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${GHOST_DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      N8N_HOST: ${N8N_DOMAIN}
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://${N8N_DOMAIN}/
      N8N_EDITOR_BASE_URL: https://${N8N_DOMAIN}/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_N8N_PASSWORD}
      GENERIC_TIMEZONE: ${TZ:-UTC}
      N8N_DEFAULT_BINARY_DATA_MODE: filesystem
    volumes:
      - n8n_data:/home/node/.n8n
    networks: [stack]
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks: [stack]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks: [stack]

  plausible:
    image: ghcr.io/plausible/community-edition:v2.1.5
    restart: unless-stopped
    command: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    environment:
      BASE_URL: https://${PLAUSIBLE_DOMAIN}
      SECRET_KEY_BASE: ${PLAUSIBLE_SECRET_KEY_BASE}
      DATABASE_URL: postgres://plausible:${POSTGRES_PLAUSIBLE_PASSWORD}@postgres:5432/plausible
      CLICKHOUSE_DATABASE_URL: http://plausible_ch:8123/plausible_events
      DISABLE_REGISTRATION: "invite_only"
    networks: [stack]
    depends_on:
      postgres:
        condition: service_healthy
      plausible_ch:
        condition: service_started

  plausible_ch:
    image: clickhouse/clickhouse-server:24.3.3.102-alpine
    restart: unless-stopped
    volumes:
      - plausible_ch_data:/var/lib/clickhouse
      - ./plausible-clickhouse-user.xml:/etc/clickhouse-server/users.d/logging.xml:ro
    networks: [stack]
    ulimits:
      nofile: { soft: 262144, hard: 262144 }

  uptime:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - uptime_data:/app/data
    networks: [stack]

volumes:
  caddy_data:
  caddy_config:
  ghost_content:
  ghost_db_data:
  n8n_data:
  postgres_data:
  redis_data:
  plausible_ch_data:
  uptime_data:

networks:
  stack:
    driver: bridge
