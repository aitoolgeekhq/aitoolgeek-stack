# Cloudflare Tunnel config for the aitoolgeek stack.
# Matches the existing pattern used by pratibedan, affine-notes, etc.
#
# DESTINATION on server: /home/YOUR-USER/.cloudflared/config-aitoolgeek.yml
#
# Uses a Cloudflare Tunnel you create. Create one with: `cloudflared tunnel create aitoolgeek-stack`
# which was created on 2026-01-28 but never activated.
#
# Replace ${CONTAINER_IP} with the IP from:
#   incus list aitoolgeek-web -c4
# (likely 192.168.108.X, same subnet as your other containers).

tunnel: YOUR-TUNNEL-UUID
credentials-file: /home/YOUR-USER/.cloudflared/YOUR-TUNNEL-UUID.json

ingress:
  - hostname: aitoolgeek.ai
    service: http://${CONTAINER_IP}:80

  - hostname: www.aitoolgeek.ai
    service: http://${CONTAINER_IP}:80

  - hostname: n8n.aitoolgeek.ai
    service: http://${CONTAINER_IP}:80

  - hostname: stats.aitoolgeek.ai
    service: http://${CONTAINER_IP}:80

  - hostname: status.aitoolgeek.ai
    service: http://${CONTAINER_IP}:80

  - service: http_status:404
